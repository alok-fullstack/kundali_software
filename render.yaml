services:
  # Backend API Service
  - type: web
    name: kundali-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: https://kundali-software-eight.vercel.app,https://kundali-software.vercel.app,http://localhost:3000
    healthCheckPath: /health
